<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Calculadora Estatística</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>Calculadora de Estatísticas Básicas</h1>

    <p>
      Digite números e palavras separados por vírgula:
    </p>

    <textarea id="entrada">
10, 20, 30, banana, maçã, 20, teste, banana, 50
    </textarea>

    <button onclick="analisarDados()">
      Analisar Dados
    </button>

    <div id="resultado" class="resultado"></div>

  </div>

  <script src="script.js"></script>

</body>
</html>
